name: LARUS V11 LEARNING TEST

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: larus-v11-learning-test
  cancel-in-progress: false

jobs:
  v11-learning:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Repoyu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kutuphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: V11 ogrenme motorunu calistir
        run: |
          python v11_learning.py

      - name: V11 sonuclarini goster
        if: always()
        run: |
          echo "===== V11 SIGNAL HISTORY ====="

          if [ -f v11_signal_history.csv ]; then
            tail -n 20 v11_signal_history.csv
          else
            echo "v11_signal_history.csv bulunamadi."
          fi

          echo ""

          echo "===== V11 LEARNING SUMMARY ====="

          if [ -f v11_learning_summary.csv ]; then
            cat v11_learning_summary.csv
          else
            echo "v11_learning_summary.csv bulunamadi."
          fi

          echo ""

          echo "===== V11 LEARNED WEIGHTS ====="

          if [ -f v11_learned_weights.csv ]; then
            cat v11_learned_weights.csv
          else
            echo "v11_learned_weights.csv bulunamadi."
          fi

      - name: Sonuclari GitHub'a kaydet
        run: |
          git config user.name "larus-alpha-bot"
          git config user.email "larus-alpha-bot@users.noreply.github.com"

          git add v11_signal_history.csv || true
          git add v11_learning_summary.csv || true
          git add v11_learned_weights.csv || true

          git diff --cached --quiet || git commit -m "V11 learning memory update"

          git push

      - name: Artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: larus-v11-learning-results
          path: |
            v11_signal_history.csv
            v11_learning_summary.csv
            v11_learned_weights.csv
          if-no-files-found: warn
