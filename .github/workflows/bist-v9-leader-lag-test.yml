name: BIST V9 LEADER LAG TEST

on:
  workflow_dispatch:
    inputs:
      symbol_limit:
        description: "İlk testte incelenecek hisse sayısı"
        required: false
        default: "50"

permissions:
  contents: read

jobs:
  leader-lag-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      V9_SYMBOL_LIMIT: ${{ github.event.inputs.symbol_limit || '50' }}

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kütüphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: V9 lider takipçi analizini çalıştır
        run: |
          python v9_leader_lag.py

      - name: V9 sonuçlarını göster
        if: always()
        run: |
          echo "===== V9 LİDER TAKİPÇİ SONUÇLARI ====="

          if [ -f v9_leader_lag_results.csv ]; then
            echo "Satır sayısı:"
            wc -l v9_leader_lag_results.csv

            echo "En güçlü ilişkiler:"
            head -n 31 v9_leader_lag_results.csv
          else
            echo "v9_leader_lag_results.csv oluşmadı."
          fi

      - name: Sonuç dosyasını artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v9-leader-lag-results
          path: v9_leader_lag_results.csv
          if-no-files-found: warn
