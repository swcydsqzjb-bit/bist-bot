name: BIST V3 DAILY

on:
  workflow_dispatch:

  schedule:
    # Türkiye saatiyle yaklaşık 09:40
    # GitHub cron UTC kullanır: 06:40 UTC = 09:40 Türkiye
    # Pazartesi-Cuma
    - cron: "40 6 * * 1-5"

permissions:
  contents: write

concurrency:
  group: bist-v3-daily
  cancel-in-progress: false

jobs:
  v3-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TOKEN: ${{ secrets.TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

      # 0 = BIST listesinin tamamı
      V3_SYMBOL_LIMIT: "0"

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kütüphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: V3 tam BIST taramasını çalıştır
        run: |
          python v3_main.py

      - name: Performans hafızasını güncelle
        run: |
          python v3_performance.py

      - name: V4 öğrenme motorunu çalıştır
        run: |
          python v4_learning.py

      - name: Çalışma özetini göster
        if: always()
        run: |
          echo "===== BUGÜNÜN V3 ADAYLARI ====="
          if [ -f v3_today_candidates.csv ]; then
            cat v3_today_candidates.csv
          else
            echo "Bugünkü aday dosyası oluşmadı."
          fi

          echo "===== V3 PERFORMANS ÖZETİ ====="
          if [ -f v3_performance_summary.csv ]; then
            cat v3_performance_summary.csv
          else
            echo "Performans özeti oluşmadı."
          fi

          echo "===== V4 ÖĞRENME SONUÇLARI ====="
          if [ -f v4_learning_results.csv ]; then
            cat v4_learning_results.csv
          else
            echo "V4 öğrenme sonucu oluşmadı."
          fi

      - name: V3 hafızasını repoya kaydet
        run: |
          if [ ! -f v3_signals_history.csv ]; then
            echo "v3_signals_history.csv oluşmadı; kayıt yapılmayacak."
            exit 0
          fi

          git config user.name "bist-v3-bot"
          git config user.email "bist-v3-bot@users.noreply.github.com"

          git add v3_signals_history.csv

          if [ -f v3_performance_summary.csv ]; then
            git add v3_performance_summary.csv
          fi

          if git diff --cached --quiet; then
            echo "Hafızada yeni değişiklik yok."
            exit 0
          fi

          git commit -m "V3 günlük performans hafızasını güncelle"

          # Başka workflow aynı anda commit attıysa önce son hâli al.
          git pull --rebase origin main
          git push origin main
