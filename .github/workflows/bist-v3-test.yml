name: BIST V3 TEST

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  v3-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kütüphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: V3 veri motorunu test et
        run: |
          python v3_data.py
