name: BIST V7 SIMILARITY TEST

on:
  workflow_dispatch:
    inputs:
      symbol_limit:
        description: "Bugünkü taramada kullanılacak hisse sayısı"
        required: false
        default: "50"

permissions:
  contents: read

jobs:
  similarity-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      TOKEN: ${{ secrets.TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      V3_SYMBOL_LIMIT: ${{ github.event.inputs.symbol_limit || '50' }}

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kütüphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bugünkü V3 adaylarını üret
        run: |
          python v3_scanner.py

      - name: V7 benzerlik analizini çalıştır
        run: |
          python v7_similarity.py

      - name: V7 sonuçlarını göster
        if: always()
        run: |
          echo "===== V7 AI BENZERLİK SONUÇLARI ====="

          if [ -f v7_similarity_results.csv ]; then
            cat v7_similarity_results.csv
          else
            echo "v7_similarity_results.csv oluşmadı."
          fi
