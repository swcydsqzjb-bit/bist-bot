name: BIST V8 FUSION TEST

on:
  workflow_dispatch:
    inputs:
      symbol_limit:
        description: "İlk testte taranacak hisse sayısı"
        required: false
        default: "50"

permissions:
  contents: read

jobs:
  fusion-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TOKEN: ${{ secrets.TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      V8_SYMBOL_LIMIT: ${{ github.event.inputs.symbol_limit || '50' }}

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kütüphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: V8 birleşik sistemi çalıştır
        run: |
          python v8_main.py

      - name: V8 sonuçlarını göster
        if: always()
        run: |
          echo "===== V8 NİHAİ ADAYLAR ====="

          if [ -f v8_today_candidates.csv ]; then
            cat v8_today_candidates.csv
          else
            echo "v8_today_candidates.csv oluşmadı."
          fi

          echo "===== V8 KISA LİSTE ====="

          if [ -f v8_fusion_results.csv ]; then
            head -n 16 v8_fusion_results.csv
          else
            echo "v8_fusion_results.csv oluşmadı."
          fi
