name: LARUS ALPHA FULL MARKET

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: larus-alpha-full-market
  cancel-in-progress: false

jobs:
  alpha-full-market:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    env:
      TOKEN: ${{ secrets.TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

      V8_SYMBOL_LIMIT: "0"
      V9_SYMBOL_LIMIT: "0"
      V10_MANUAL_LEADERS: ""
      V16_SYMBOL_LIMIT: "0"

      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      # ============================================================
      # KURULUM
      # ============================================================

      - name: Repoyu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kutuphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yfinance pandas numpy requests lxml html5lib beautifulsoup4

      # ============================================================
      # V8 + V9
      # ============================================================

      - name: V9 Lider Takipci ve V8 Fusion
        run: |
          python v9_leader_lag.py
          python v8_main.py

          test -f v8_today_candidates.csv
          test -f v8_fusion_results.csv

          echo "===== V8 ADAYLARI ====="
          cat v8_today_candidates.csv

      # ============================================================
      # V10
      # ============================================================

      - name: V10 Takipci Tahmin Motoru
        run: |
          python v10_follow_prediction.py
          python v10_telegram.py

      # ============================================================
      # V11
      # ============================================================

      - name: V11 Performans Hafizasi
        run: |
          python v11_learning.py

      # ============================================================
      # V13
      # ============================================================

      - name: V13 Market DNA
        run: |
          python v13_market_dna.py

          test -f v13_market_dna_status.json
          test -f v13_market_dna_results.csv

          python v13_telegram.py

      # ============================================================
      # V14
      # ============================================================

      - name: V14 Adaptif Karar Motoru
        run: |
          python v14_adaptive_decision.py

          test -f v14_status.json
          test -f v14_adaptive_decisions.csv

          python v14_telegram.py

      # ============================================================
      # V15
      # ============================================================

      - name: V15 Ogrenme ve Nihai Karar
        run: |
          python v15_learning.py

          test -f v15_status.json
          test -f v15_final_decisions.csv

          python v15_telegram.py

      # ============================================================
      # V16
      # ============================================================

      - name: V16 Tam Piyasa Goreli Guc
        run: |
          python v16_relative_strength.py

          test -f v16_status.json
          test -f v16_full_market_snapshot.csv
          test -f v16_relative_strength.csv

          echo "===== V16 STATUS ====="
          cat v16_status.json

          python v16_telegram.py

      # ============================================================
      # V17
      # ============================================================

      - name: V17 Tam Piyasa Rejim Motoru
        run: |
          python v17_market_regime.py

          test -f v17_market_regime_status.json
          test -f v17_regime_adjusted_decisions.csv

          echo "===== V17 STATUS ====="
          cat v17_market_regime_status.json

          python v17_telegram.py

      # ============================================================
      # V18
      # ============================================================

      - name: V18 Guven Motoru
        run: |
          python v18_confidence.py

          test -f v18_confidence_status.json
          test -f v18_confidence_decisions.csv

          echo "===== V18 STATUS ====="
          cat v18_confidence_status.json

          python v18_telegram.py

      # ============================================================
      # V19
      # ============================================================

      - name: V19 Zamanlama Motoru
        run: |
          python v19_timing_forecast.py

          test -f v19_timing_status.json
          test -f v19_timing_forecasts.csv

          echo "===== V19 STATUS ====="
          cat v19_timing_status.json

          python v19_telegram.py

      # ============================================================
      # V20.1
      # ============================================================

      - name: V20.1 AI Final Decision
        run: |
          python v20_ai_engine.py

          test -f v20_ai_status.json
          test -f v20_ai_final_decisions.csv

          echo "===== V20.1 STATUS ====="
          cat v20_ai_status.json

          python v20_telegram.py

      # ============================================================
      # V20.2
      # ============================================================

      - name: V20.2 Top Pick
        run: |
          python v20_top_pick.py

          test -f v20_top_pick_status.json
          test -f v20_top_picks.csv

          echo "===== V20.2 STATUS ====="
          cat v20_top_pick_status.json

          python v20_top_pick_telegram.py

      # ============================================================
      # V20.3
      # ============================================================

      - name: V20.3 Model Portfoyu
        run: |
          python v20_portfolio.py

          test -f v20_portfolio_status.json
          test -f v20_portfolio_model.csv

          echo "===== V20.3 STATUS ====="
          cat v20_portfolio_status.json

          python v20_portfolio_telegram.py

      # ============================================================
      # V20.4
      # ============================================================

      - name: V20.4 Izleme Plani
        run: |
          python v20_monitoring_plan.py

          test -f v20_monitoring_status.json
          test -f v20_monitoring_plan.csv

          echo "===== V20.4 STATUS ====="
          cat v20_monitoring_status.json

          python v20_monitoring_telegram.py

      # ============================================================
      # SON KONTROL
      # ============================================================

      - name: Nihai durumlari goster
        if: always()
        run: |
          echo "===== V14 ====="
          cat v14_status.json 2>/dev/null || true

          echo "===== V15 ====="
          cat v15_status.json 2>/dev/null || true

          echo "===== V16 ====="
          cat v16_status.json 2>/dev/null || true

          echo "===== V17 ====="
          cat v17_market_regime_status.json 2>/dev/null || true

          echo "===== V18 ====="
          cat v18_confidence_status.json 2>/dev/null || true

          echo "===== V19 ====="
          cat v19_timing_status.json 2>/dev/null || true

          echo "===== V20.1 ====="
          cat v20_ai_status.json 2>/dev/null || true

          echo "===== V20.2 ====="
          cat v20_top_pick_status.json 2>/dev/null || true

          echo "===== V20.3 ====="
          cat v20_portfolio_status.json 2>/dev/null || true

          echo "===== V20.4 ====="
          cat v20_monitoring_status.json 2>/dev/null || true

      # ============================================================
      # GITHUB KAYIT
      # ============================================================

      - name: Sonuclari GitHub'a kaydet
        run: |
          git config user.name "larus-alpha-bot"
          git config user.email "larus-alpha-bot@users.noreply.github.com"

          find . -maxdepth 1 -type f \
            \( -name "*.csv" -o -name "*.json" \) \
            -print0 | xargs -0 -r git add --

          if git diff --cached --quiet; then
            echo "Kaydedilecek yeni degisiklik yok."
          else
            git commit -m "LARUS V20.4 automatic results update"
            git pull --rebase origin main
            git push
          fi

      # ============================================================
      # ARTIFACT
      # ============================================================

      - name: Tum sonuclari artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: larus-alpha-v20-4-results
          path: |
            *.csv
            *.json
          if-no-files-found: warn
