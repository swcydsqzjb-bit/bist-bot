name: LARUS ALPHA FULL MARKET

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: larus-alpha-full-market
  cancel-in-progress: false

jobs:
  alpha-full-market:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      TOKEN: ${{ secrets.TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

      V8_SYMBOL_LIMIT: "0"
      V9_SYMBOL_LIMIT: "0"
      V10_MANUAL_LEADERS: ""

    steps:

      - name: Repoyu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kütüphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      ######################################################################
      # V9
      ######################################################################

      - name: Tüm BIST için V9 ilişkilerini oluştur
        run: |
          python v9_leader_lag.py

      ######################################################################
      # V8
      ######################################################################

      - name: Tüm BIST için V8 Fusion çalıştır
        run: |
          python v8_main.py

      - name: V8 aday dosyasını kontrol et
        run: |
          test -f v8_today_candidates.csv
          wc -l v8_today_candidates.csv
          head -20 v8_today_candidates.csv

      ######################################################################
      # V10
      ######################################################################

      - name: V10 Takipçi Motoru
        run: |
          python v10_follow_prediction.py

      - name: V10 Telegram
        run: |
          python v10_telegram.py

      ######################################################################
      # V11
      ######################################################################

      - name: V11 Öğrenme
        run: |
          python v11_learning.py

      ######################################################################
      # V13
      ######################################################################

      - name: V13 Market DNA
        run: |
          python v13_market_dna.py

      - name: V13 Telegram
        run: |
          python v13_telegram.py

      ######################################################################
      # V14
      ######################################################################

      - name: V14 Adaptive Decision
        run: |
          python v14_adaptive_decision.py

      - name: V14 dosyasını kontrol et
        run: |
          test -f v14_adaptive_decisions.csv
          cat v14_status.json
          head -20 v14_adaptive_decisions.csv

      - name: V14 Telegram
        run: |
          python v14_telegram.py

      ######################################################################
      # V15
      ######################################################################

      - name: V15 Learning Engine
        run: |
          python v15_learning.py

      - name: V15 dosyasını kontrol et
        run: |
          test -f v15_final_decisions.csv
          cat v15_status.json
          head -20 v15_final_decisions.csv

      - name: V15 Telegram
        run: |
          python v15_telegram.py

      ######################################################################
      # GITHUB SAVE
      ######################################################################

      - name: Sonuçları GitHub'a kaydet
        run: |
          git config user.name "larus-alpha-bot"
          git config user.email "larus-alpha-bot@users.noreply.github.com"

          git add *.csv || true
          git add *.json || true

          if git diff --cached --quiet; then
            echo "Kaydedilecek değişiklik yok."
          else
            git commit -m "LARUS automatic update"
            git push
          fi

      ######################################################################
      # ARTIFACT
      ######################################################################

      - name: Sonuçları Artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: larus-alpha-results
          path: |
            *.csv
            *.json
          if-no-files-found: warn
