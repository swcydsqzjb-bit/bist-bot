name: LARUS ALPHA FULL MARKET

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: larus-alpha-full-market
  cancel-in-progress: false

jobs:
  alpha-full-market:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      TOKEN: ${{ secrets.TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

      V8_SYMBOL_LIMIT: "0"
      V9_SYMBOL_LIMIT: "0"
      V10_MANUAL_LEADERS: ""

    steps:
      - name: Repoyu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kutuphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tum BIST icin V9 iliskilerini olustur
        run: |
          python v9_leader_lag.py

      - name: Tum BIST icin V8 Fusion calistir
        run: |
          python v8_main.py

      - name: V8 aday dosyasini kontrol et
        run: |
          echo "===== V8 ADAY DOSYASI KONTROL ====="

          if [ -f v8_today_candidates.csv ]; then
            echo "v8_today_candidates.csv bulundu."
            wc -l v8_today_candidates.csv
            head -n 10 v8_today_candidates.csv
          else
            echo "HATA: v8_today_candidates.csv olusmadi."
            exit 1
          fi

      - name: V10 takipci adaylarini olustur
        run: |
          python v10_follow_prediction.py

      - name: V10 Telegram raporunu gonder
        run: |
          python v10_telegram.py

      - name: V11 performans hafizasini guncelle
        run: |
          python v11_learning.py

      - name: V13 Market DNA analizini calistir
        run: |
          python v13_market_dna.py

      - name: V13 Telegram raporunu gonder
        run: |
          python v13_telegram.py

      - name: V14 Adaptif Karar Motorunu calistir
        run: |
          python v14_adaptive_decision.py

      - name: V14 karar dosyasini kontrol et
        run: |
          echo "===== V14 KARAR DOSYASI KONTROL ====="

          if [ -f v14_adaptive_decisions.csv ]; then
            echo "v14_adaptive_decisions.csv bulundu."
            cat v14_adaptive_decisions.csv
          else
            echo "HATA: v14_adaptive_decisions.csv olusmadi."
            exit 1
          fi

      - name: V14 Telegram raporunu gonder
        run: |
          python v14_telegram.py

      - name: Sonuclari goster
        if: always()
        run: |
          echo "===== V8 META ====="
          cat v8_fusion_meta.csv 2>/dev/null || true

          echo ""
          echo "===== V8 NIHAI ADAYLAR ====="
          cat v8_today_candidates.csv 2>/dev/null || true

          echo ""
          echo "===== V10 TAKIPCI ADAYLARI ====="
          cat v10_follow_predictions.csv 2>/dev/null || true

          echo ""
          echo "===== V11 SINYAL HAFIZASI ====="
          tail -n 20 v11_signal_history.csv 2>/dev/null || true

          echo ""
          echo "===== V11 PERFORMANS OZETI ====="
          cat v11_learning_summary.csv 2>/dev/null || true

          echo ""
          echo "===== V13 MARKET DNA STATUS ====="
          cat v13_market_dna_status.json 2>/dev/null || true

          echo ""
          echo "===== V13 MARKET DNA SONUCLARI ====="
          cat v13_market_dna_results.csv 2>/dev/null || true

          echo ""
          echo "===== V14 STATUS ====="
          cat v14_status.json 2>/dev/null || true

          echo ""
          echo "===== V14 ADAPTIF KARARLAR ====="
          cat v14_adaptive_decisions.csv 2>/dev/null || true

      - name: Hafiza ve analiz sonuclarini repoya kaydet
        run: |
          git config user.name "larus-alpha-bot"
          git config user.email "larus-alpha-bot@users.noreply.github.com"

          git add v11_signal_history.csv || true
          git add v11_learning_summary.csv || true
          git add v11_learned_weights.csv || true
          git add v13_market_dna_status.json || true
          git add v13_market_dna_results.csv || true
          git add v14_status.json || true
          git add v14_adaptive_decisions.csv || true

          if git diff --cached --quiet; then
            echo "Kaydedilecek yeni degisiklik yok."
          else
            git commit -m "LARUS V11 V13 V14 update"
            git push
          fi

      - name: Tum sonuclari artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: larus-alpha-full-market-results
          path: |
            v8_fusion_meta.csv
            v8_today_candidates.csv
            v8_fusion_results.csv
            v9_leader_lag_results.csv
            v10_follow_predictions.csv
            v11_signal_history.csv
            v11_learning_summary.csv
            v11_learned_weights.csv
            v13_market_dna_status.json
            v13_market_dna_results.csv
            v14_status.json
            v14_adaptive_decisions.csv
          if-no-files-found: warn
