name: LARUS ALPHA FULL MARKET

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: larus-alpha-full-market
  cancel-in-progress: false

jobs:
  alpha-full-market:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    env:
      TOKEN: ${{ secrets.TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

      V8_SYMBOL_LIMIT: "0"
      V9_SYMBOL_LIMIT: "0"
      V10_MANUAL_LEADERS: ""
      V16_SYMBOL_LIMIT: "0"

      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      # ============================================================
      # KURULUM
      # ============================================================

      - name: Repoyu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kutuphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yfinance pandas numpy requests lxml html5lib beautifulsoup4

      # ============================================================
      # V9 - LIDER TAKIPCI ILISKILERI
      # ============================================================

      - name: V9 Lider Takipci Iliskilerini Olustur
        run: |
          python v9_leader_lag.py

      # ============================================================
      # V8 - FUSION TARAMASI
      # ============================================================

      - name: V8 Fusion Taramasini Calistir
        run: |
          python v8_main.py

          test -f v8_today_candidates.csv
          test -f v8_fusion_results.csv

          echo "===== V8 ADAYLARI ====="
          cat v8_today_candidates.csv

      # ============================================================
      # V10 - TAKIPCI TAHMINI
      # ============================================================

      - name: V10 Takipci Tahmin Motorunu Calistir
        run: |
          python v10_follow_prediction.py

          test -f v10_follow_predictions.csv

      - name: V10 Telegram Raporunu Gonder
        run: |
          python v10_telegram.py

      # ============================================================
      # V11 - PERFORMANS HAFIZASI
      # ============================================================

      - name: V11 Performans Hafizasini Guncelle
        run: |
          python v11_learning.py

          test -f v11_signal_history.csv
          test -f v11_learning_summary.csv
          test -f v11_learned_weights.csv

          echo "===== V11 OGRENME DURUMU ====="
          cat v11_learning_summary.csv

      # ============================================================
      # V13 - MARKET DNA
      # ============================================================

      - name: V13 Market DNA Analizini Calistir
        run: |
          python v13_market_dna.py

          test -f v13_market_dna_status.json
          test -f v13_market_dna_results.csv

          echo "===== V13 STATUS ====="
          cat v13_market_dna_status.json

      - name: V13 Telegram Raporunu Gonder
        run: |
          python v13_telegram.py

      # ============================================================
      # V14 - ADAPTIF KARAR
      # ============================================================

      - name: V14 Adaptif Karar Motorunu Calistir
        run: |
          python v14_adaptive_decision.py

          test -f v14_status.json
          test -f v14_adaptive_decisions.csv

          echo "===== V14 STATUS ====="
          cat v14_status.json

      - name: V14 Telegram Raporunu Gonder
        run: |
          python v14_telegram.py

      # ============================================================
      # V15 - OGRENME VE NIHAI KARAR
      # ============================================================

      - name: V15 Ogrenme ve Nihai Karar Motorunu Calistir
        run: |
          python v15_learning.py

          test -f v15_status.json
          test -f v15_model_weights.csv
          test -f v15_final_decisions.csv

          echo "===== V15 STATUS ====="
          cat v15_status.json

      - name: V15 Telegram Raporunu Gonder
        run: |
          python v15_telegram.py

      # ============================================================
      # V16 - TAM PIYASA GORELI GUC
      # ============================================================

      - name: V16 Tam Piyasa Goreli Guc Motorunu Calistir
        run: |
          python v16_relative_strength.py

          test -f v16_status.json
          test -f v16_full_market_snapshot.csv
          test -f v16_relative_strength.csv

          echo "===== V16 STATUS ====="
          cat v16_status.json

      - name: V16 Telegram Raporunu Gonder
        run: |
          python v16_telegram.py

      # ============================================================
      # V17 - PIYASA REJIMI
      # ============================================================

      - name: V17 Piyasa Rejim Motorunu Calistir
        run: |
          python v17_market_regime.py

          test -f v17_market_regime_status.json
          test -f v17_regime_adjusted_decisions.csv

          echo "===== V17 STATUS ====="
          cat v17_market_regime_status.json

      - name: V17 Telegram Raporunu Gonder
        run: |
          python v17_telegram.py

      # ============================================================
      # V18 - GUVEN MOTORU
      # ============================================================

      - name: V18 Guven Motorunu Calistir
        run: |
          python v18_confidence.py

          test -f v18_confidence_status.json
          test -f v18_confidence_decisions.csv

          echo "===== V18 STATUS ====="
          cat v18_confidence_status.json

      - name: V18 Telegram Raporunu Gonder
        run: |
          python v18_telegram.py

      # ============================================================
      # V19 - ZAMANLAMA MOTORU
      # ============================================================

      - name: V19 Zamanlama Motorunu Calistir
        run: |
          python v19_timing_forecast.py

          test -f v19_timing_status.json
          test -f v19_timing_forecasts.csv

          echo "===== V19 STATUS ====="
          cat v19_timing_status.json

      - name: V19 Telegram Raporunu Gonder
        run: |
          python v19_telegram.py

      # ============================================================
      # V20.1 - AI FINAL KARAR
      # ============================================================

      - name: V20 AI Final Karar Motorunu Calistir
        run: |
          python v20_ai_engine.py

          test -f v20_ai_status.json
          test -f v20_ai_final_decisions.csv

          echo "===== V20 STATUS ====="
          cat v20_ai_status.json

      - name: V20 Telegram Raporunu Gonder
        run: |
          python v20_telegram.py

      # ============================================================
      # V20.2 - TOP PICKS
      # ============================================================

      - name: V20.2 Top Pick Motorunu Calistir
        run: |
          python v20_top_pick.py

          test -f v20_top_pick_status.json
          test -f v20_top_picks.csv

          echo "===== V20.2 STATUS ====="
          cat v20_top_pick_status.json

      - name: V20.2 Telegram Raporunu Gonder
        run: |
          python v20_top_pick_telegram.py

      # ============================================================
      # V20.3 - MODEL PORTFOYU
      # ============================================================

      - name: V20.3 Model Portfoy Motorunu Calistir
        run: |
          python v20_portfolio.py

          test -f v20_portfolio_status.json
          test -f v20_portfolio_model.csv

          echo "===== V20.3 STATUS ====="
          cat v20_portfolio_status.json

      - name: V20.3 Telegram Raporunu Gonder
        run: |
          python v20_portfolio_telegram.py

      # ============================================================
      # V20.4 - IZLEME PLANI
      # ============================================================

      - name: V20.4 Izleme Plani Motorunu Calistir
        run: |
          python v20_monitoring_plan.py

          test -f v20_monitoring_status.json
          test -f v20_monitoring_plan.csv

          echo "===== V20.4 STATUS ====="
          cat v20_monitoring_status.json

      - name: V20.4 Telegram Raporunu Gonder
        run: |
          python v20_monitoring_telegram.py

      # ============================================================
      # V21 - SELF LEARNING
      # ============================================================

      - name: V21 Self Learning Motorunu Calistir
        run: |
          python v21_self_learning.py

          test -f v21_status.json
          test -f v21_learning_report.csv
          test -f v21_learned_weights.csv

          echo "===== V21 STATUS ====="
          cat v21_status.json

      - name: V21 Telegram Raporunu Gonder
        run: |
          python v21_telegram.py

      # ============================================================
      # V22 - SINYAL DURUM MOTORU
      # ============================================================

      - name: V22 Sinyal Durum Motorunu Calistir
        run: |
          python v22_signal_engine.py

          test -f v22_status.json
          test -f v22_signal_states.csv

          echo "===== V22 STATUS ====="
          cat v22_status.json

      - name: V22 Telegram Raporunu Gonder
        run: |
          python v22_telegram.py

      # ============================================================
      # V23 - POZISYON YONETIMI
      # ============================================================

      - name: V23 Pozisyon Yonetim Motorunu Calistir
        run: |
          python v23_position_manager.py

          test -f v23_status.json
          test -f v23_positions.csv
          test -f v23_position_history.csv

          echo "===== V23 STATUS ====="
          cat v23_status.json

      - name: V23 Telegram Raporunu Gonder
        run: |
          python v23_telegram.py

      # ============================================================
      # V24 - CANLI TEYIT
      # ============================================================

      - name: V24 Canli Teyit Motorunu Calistir
        run: |
          python v24_live_confirmation.py

          test -f v24_status.json
          test -f v24_live_confirmations.csv

          echo "===== V24 STATUS ====="
          cat v24_status.json

      - name: V24 Telegram Raporunu Gonder
        run: |
          python v24_telegram.py

      # ============================================================
      # V25 - PERFORMANS DEGERLENDIRME
      # ============================================================

      - name: V25 Performans Degerlendirme Motoru
        run: |
          python v25_performance_evaluator.py

          test -f v25_status.json
          test -f v25_performance_evaluations.csv
          test -f v25_performance_memory.csv

          echo "===== V25 STATUS ====="
          cat v25_status.json

      - name: V25 Telegram Raporunu Gonder
        run: |
          python v25_telegram.py

      # ============================================================
      # V26 - PORTFOY OPTIMIZASYONU
      # ============================================================

      - name: V26 Portfoy Optimizasyon Motoru
        run: |
          python v26_portfolio_optimizer.py

          test -f v26_status.json
          test -f v26_optimized_portfolio.csv

          echo "===== V26 STATUS ====="
          cat v26_status.json

      - name: V26 Telegram Raporunu Gonder
        run: |
          python v26_telegram.py

      # ============================================================
      # V27 - ANA KARAR SISTEMI
      # ============================================================

      - name: V27 Ana Karar Motoru
        run: |
          python v27_master_decision.py

          test -f v27_status.json
          test -f v27_master_decisions.csv

          echo "===== V27 STATUS ====="
          cat v27_status.json

      - name: V27 Telegram Raporunu Gonder
        run: |
          python v27_telegram.py

      # ============================================================
      # V28 - GOZLEM HAVUZU
      # ============================================================

      - name: V28 Gozlem Havuzunu Guncelle
        run: |
          python v28_observation_pool.py

          test -f v28_status.json
          test -f v28_observation_history.csv
          test -f v28_latest_observations.csv

          echo "===== V28 STATUS ====="
          cat v28_status.json

      # ============================================================
      # V29 - GERCEKLESEN SONUC TAKIBI
      # ============================================================

      - name: V29 Gerceklesen Sonuclari Guncelle
        run: |
          python v29_outcome_tracker.py

          test -f v29_status.json
          test -f v29_evaluated_observations.csv
          test -f v29_outcome_summary.csv
          test -f v29_missed_opportunities.csv

          echo "===== V29 STATUS ====="
          cat v29_status.json

      # ============================================================
      # V30 - ORUNTU OGRENME MOTORU
      # ============================================================

      - name: V30 Oruntu Ogrenme Motorunu Calistir
        run: |
          python v30_pattern_learning.py

          test -f v30_status.json
          test -f v30_learned_patterns.csv
          test -f v30_feature_adjustments.csv

          echo "===== V30 STATUS ====="
          cat v30_status.json

          echo "===== V30 OGRENILEN ORUNTULER ====="
          if [ -s v30_learned_patterns.csv ]; then
            cat v30_learned_patterns.csv
          else
            echo "V30 henuz aktif oruntu uretmedi."
          fi

          echo "===== V30 OZELLIK BONUSLARI ====="
          if [ -s v30_feature_adjustments.csv ]; then
            cat v30_feature_adjustments.csv
          else
            echo "V30 henuz uygulanabilir bonus uretmedi."
          fi

      - name: V30 Telegram Raporunu Gonder
        run: |
          python v30_telegram.py

      # ============================================================
      # TUM MOTOR DURUMLARI
      # ============================================================

      - name: Tum Motor Durumlarini Goster
        if: always()
        run: |
          for file in \
            v13_market_dna_status.json \
            v14_status.json \
            v15_status.json \
            v16_status.json \
            v17_market_regime_status.json \
            v18_confidence_status.json \
            v19_timing_status.json \
            v20_ai_status.json \
            v20_top_pick_status.json \
            v20_portfolio_status.json \
            v20_monitoring_status.json \
            v21_status.json \
            v22_status.json \
            v23_status.json \
            v24_status.json \
            v25_status.json \
            v26_status.json \
            v27_status.json \
            v28_status.json \
            v29_status.json \
            v30_status.json
          do
            if [ -f "$file" ]; then
              echo "===== $file ====="
              cat "$file"
            else
              echo "===== $file BULUNAMADI ====="
            fi
          done

      # ============================================================
      # GITHUB COMMIT - CAKISMA DAYANIKLI
      # ============================================================

      - name: Sonuclari GitHub'a Kaydet
        run: |
          set -e

          git config user.name "larus-alpha-bot"
          git config user.email "larus-alpha-bot@users.noreply.github.com"

          find . -maxdepth 1 -type f \( -name "*.csv" -o -name "*.json" \) -print0 \
            | xargs -0 -r git add

          if git diff --cached --quiet; then
            echo "Kaydedilecek degisiklik yok."
            exit 0
          fi

          git commit -m "LARUS V30 automatic update"

          PUSH_SUCCESS="false"

          for ATTEMPT in 1 2 3 4 5
          do
            echo "===== GITHUB PUSH DENEMESI $ATTEMPT/5 ====="

            git fetch origin main

            if ! git rebase origin/main; then
              echo "Rebase islemi basarisiz oldu."
              git rebase --abort || true
              exit 1
            fi

            if git push origin HEAD:main; then
              echo "Sonuclar GitHub'a basariyla kaydedildi."
              PUSH_SUCCESS="true"
              break
            fi

            echo "Push sirasinda uzak repo yeniden degisti."
            echo "Tekrar denemeden once bekleniyor."

            sleep $((ATTEMPT * 5))
          done

          if [ "$PUSH_SUCCESS" != "true" ]; then
            echo "5 denemeye ragmen GitHub push tamamlanamadi."
            exit 1
          fi

      # ============================================================
      # ARTIFACT
      # ============================================================

      - name: Sonuclari Artifact Olarak Yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: larus-alpha-v30-results
          path: |
            *.csv
            *.json
          if-no-files-found: warn
