name: LARUS ALPHA FULL MARKET

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: larus-alpha-full-market
  cancel-in-progress: false

jobs:
  alpha-full-market:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      TOKEN: ${{ secrets.TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

      # 0 = tum BIST hisselerini tara
      V8_SYMBOL_LIMIT: "0"
      V9_SYMBOL_LIMIT: "0"

      # Bos birakilirsa V10, V8 adaylarini lider kabul eder
      V10_MANUAL_LEADERS: ""

    steps:
      - name: Repoyu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kutuphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tum BIST icin V9 iliskilerini olustur
        run: |
          python v9_leader_lag.py

      - name: Tum BIST icin V8 Fusion calistir
        run: |
          python v8_main.py

      - name: V8 aday dosyasini kontrol et
        run: |
          echo "===== V8 ADAY DOSYASI KONTROL ====="

          if [ -f v8_today_candidates.csv ]; then
            echo "v8_today_candidates.csv bulundu."
            echo "Satir sayisi:"
            wc -l v8_today_candidates.csv

            echo "Ilk kayitlar:"
            head -n 10 v8_today_candidates.csv
          else
            echo "HATA: v8_today_candidates.csv olusmadi."
            exit 1
          fi

      - name: V10 takipci adaylarini olustur
        run: |
          python v10_follow_prediction.py

      - name: V10 Telegram raporunu gonder
        run: |
          python v10_telegram.py

      - name: V11 performans hafizasini guncelle
        run: |
          python v11_learning.py

      - name: V13 Market DNA analizini calistir
        run: |
          python v13_market_dna.py

      - name: V13 Telegram raporunu gonder
        run: |
          python v13_telegram.py

      - name: Sonuclari goster
        if: always()
        run: |
          echo "===== V8 META ====="

          if [ -f v8_fusion_meta.csv ]; then
            cat v8_fusion_meta.csv
          else
            echo "v8_fusion_meta.csv olusmadi."
          fi

          echo ""
          echo "===== V8 NIHAI ADAYLAR ====="

          if [ -f v8_today_candidates.csv ]; then
            cat v8_today_candidates.csv
          else
            echo "v8_today_candidates.csv olusmadi."
          fi

          echo ""
          echo "===== V9 LIDER TAKIPCI ILISKILERI ====="

          if [ -f v9_leader_lag_results.csv ]; then
            echo "Toplam satir:"
            wc -l v9_leader_lag_results.csv

            echo "En guclu iliskiler:"
            head -n 21 v9_leader_lag_results.csv
          else
            echo "v9_leader_lag_results.csv olusmadi."
          fi

          echo ""
          echo "===== V10 TAKIPCI ADAYLARI ====="

          if [ -f v10_follow_predictions.csv ]; then
            cat v10_follow_predictions.csv
          else
            echo "v10_follow_predictions.csv olusmadi."
          fi

          echo ""
          echo "===== V11 SINYAL HAFIZASI ====="

          if [ -f v11_signal_history.csv ]; then
            echo "Toplam satir:"
            wc -l v11_signal_history.csv

            echo "Son kayitlar:"
            tail -n 20 v11_signal_history.csv
          else
            echo "v11_signal_history.csv olusmadi."
          fi

          echo ""
          echo "===== V11 PERFORMANS OZETI ====="

          if [ -f v11_learning_summary.csv ]; then
            cat v11_learning_summary.csv
          else
            echo "v11_learning_summary.csv olusmadi."
          fi

          echo ""
          echo "===== V11 OGRENILEN AGIRLIKLAR ====="

          if [ -f v11_learned_weights.csv ]; then
            cat v11_learned_weights.csv
          else
            echo "v11_learned_weights.csv olusmadi."
          fi

          echo ""
          echo "===== V13 MARKET DNA STATUS ====="

          if [ -f v13_market_dna_status.json ]; then
            cat v13_market_dna_status.json
          else
            echo "v13_market_dna_status.json olusmadi."
          fi

          echo ""
          echo "===== V13 MARKET DNA SONUCLARI ====="

          if [ -f v13_market_dna_results.csv ]; then
            cat v13_market_dna_results.csv
          else
            echo "v13_market_dna_results.csv olusmadi."
          fi

      - name: Hafiza ve analiz sonuclarini repoya kaydet
        run: |
          git config user.name "larus-alpha-bot"
          git config user.email "larus-alpha-bot@users.noreply.github.com"

          git add v11_signal_history.csv || true
          git add v11_learning_summary.csv || true
          git add v11_learned_weights.csv || true
          git add v13_market_dna_status.json || true
          git add v13_market_dna_results.csv || true

          if git diff --cached --quiet; then
            echo "Kaydedilecek yeni degisiklik yok."
          else
            git commit -m "LARUS learning and Market DNA update"
            git push
          fi

      - name: Tum sonuclari artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: larus-alpha-full-market-results
          path: |
            v8_fusion_meta.csv
            v8_today_candidates.csv
            v8_fusion_results.csv
            v9_leader_lag_results.csv
            v10_follow_predictions.csv
            v11_signal_history.csv
            v11_learning_summary.csv
            v11_learned_weights.csv
            v13_market_dna_status.json
            v13_market_dna_results.csv
          if-no-files-found: warn
