name: LARUS ALPHA FULL MARKET

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: larus-alpha-full-market
  cancel-in-progress: false

jobs:
  alpha-full-market:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      TOKEN: ${{ secrets.TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

      # 0 değeri tüm BIST hisselerini tarar.
      V8_SYMBOL_LIMIT: "0"
      V9_SYMBOL_LIMIT: "0"

      # Boş olduğu için V10 manuel lider kullanmaz.
      # V8'in gerçek seçtiği hisseleri lider kabul eder.
      V10_MANUAL_LEADERS: ""

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kütüphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tüm BIST için V9 ilişkilerini oluştur
        run: |
          python v9_leader_lag.py

      - name: Tüm BIST için V8 Fusion çalıştır
        run: |
          python v8_main.py

      - name: V10 takipçi adaylarını oluştur
        run: |
          python v10_follow_prediction.py

      - name: V10 Telegram raporunu gönder
        run: |
          python v10_telegram.py

      - name: Sonuçları göster
        if: always()
        run: |
          echo "===== V8 NİHAİ ADAYLAR ====="

          if [ -f v8_today_candidates.csv ]; then
            cat v8_today_candidates.csv
          else
            echo "v8_today_candidates.csv oluşmadı."
          fi

          echo ""
          echo "===== V9 LİDER TAKİPÇİ İLİŞKİLERİ ====="

          if [ -f v9_leader_lag_results.csv ]; then
            echo "Toplam satır:"
            wc -l v9_leader_lag_results.csv

            echo "En güçlü ilişkiler:"
            head -n 21 v9_leader_lag_results.csv
          else
            echo "v9_leader_lag_results.csv oluşmadı."
          fi

          echo ""
          echo "===== V10 TAKİPÇİ ADAYLARI ====="

          if [ -f v10_follow_predictions.csv ]; then
            cat v10_follow_predictions.csv
          else
            echo "v10_follow_predictions.csv oluşmadı."
          fi

      - name: Sonuçları artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: larus-alpha-full-market-results
          path: |
            v8_today_candidates.csv
            v8_fusion_results.csv
            v9_leader_lag_results.csv
            v10_follow_predictions.csv
          if-no-files-found: warn
