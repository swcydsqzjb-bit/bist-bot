name: BIST V5 BACKFILL TEST

on:
  workflow_dispatch:
    inputs:
      symbol_limit:
        description: "Taranacak hisse sayısı; tüm BIST için 0"
        required: false
        default: "50"

      step_days:
        description: "Kaç işlem gününde bir geçmiş tarama"
        required: false
        default: "10"

permissions:
  contents: write

concurrency:
  group: bist-v5-backfill
  cancel-in-progress: false

jobs:
  backfill-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      V5_SYMBOL_LIMIT: ${{ github.event.inputs.symbol_limit || '50' }}
      V5_STEP_DAYS: ${{ github.event.inputs.step_days || '10' }}

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kütüphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: V5 geçmiş sinyallerini üret
        run: |
          python v5_backfill.py

      - name: Backfill özetini göster
        if: always()
        run: |
          echo "===== V5 BACKFILL DOSYASI ====="

          if [ -f v5_backfill_history.csv ]; then
            echo "Satır sayısı:"
            wc -l v5_backfill_history.csv

            echo "İlk kayıtlar:"
            head -n 6 v5_backfill_history.csv
          else
            echo "v5_backfill_history.csv oluşmadı."
          fi

      - name: Backfill dosyasını artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v5-backfill-history
          path: v5_backfill_history.csv
          if-no-files-found: warn

      - name: Backfill hafızasını repoya kaydet
        run: |
          if [ ! -f v5_backfill_history.csv ]; then
            echo "Backfill dosyası oluşmadı."
            exit 0
          fi

          git config user.name "bist-v7-bot"
          git config user.email "bist-v7-bot@users.noreply.github.com"

          git add v5_backfill_history.csv

          if git diff --cached --quiet; then
            echo "Backfill geçmişinde değişiklik yok."
            exit 0
          fi

          git commit -m "V5 tarihsel sinyal hafızasını güncelle"
          git pull --rebase origin main
          git push origin main
