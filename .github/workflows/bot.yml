name: BIST BOT

on:
  schedule:
    # Sabah günlük tarama - Türkiye 09:30 = UTC 06:30
    - cron: "35 6 * * 1-5"

    # Gün içi 15 dk alarm - Türkiye 10:00-18:45 arası yaklaşık
    - cron: "*/15 7-15 * * 1-5"

  workflow_dispatch:

jobs:
  daily-scan:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 6 * * 1-5'
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Kütüphaneler
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests ta numpy lxml html5lib beautifulsoup4

      - name: Günlük tarama çalıştır
        run: python bot.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_MODE: daily

  intraday-scan:
    if: github.event_name == 'schedule' && github.event.schedule == '*/15 7-15 * * 1-5'
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Kütüphaneler
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests ta numpy lxml html5lib beautifulsoup4

      - name: Gün içi alarm çalıştır
        run: python bot.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_MODE: intraday
