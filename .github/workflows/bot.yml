name: BIST BOT

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Kütüphaneler
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests ta numpy lxml html5lib beautifulsoup4
          pip install yfinance pandas numpy ta requests telethon
      - name: Botu çalıştır
        run: |
          python bot.py
          #python leader_lag.py
          echo ---- ADAYLAR TXT ----
          cat adaylar.txt || echo adaylar_txt_yok
          #python akd_reader.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          BOT_MODE: auto
# refresh
