name: BIST BOT

on:
  schedule:
    - cron: "0 */2 * * *"  # 2 saatte 1 çalışır
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

        - name: Kütüphaneler
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests ta numpy lxml html5lib beautifulsoup4
      - name: Botu çalıştır
        run: python bot.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
