name: BIST V6 INSTITUTIONAL TEST

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  institutional-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Kütüphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Institutional Score testini çalıştır
        run: |
          python v6_institutional.py
