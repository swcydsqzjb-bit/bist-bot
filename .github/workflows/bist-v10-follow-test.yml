name: BIST V10 FOLLOW TEST

on:
  workflow_dispatch:
    inputs:
      symbol_limit:
        description: "V8 ve V9 için taranacak hisse sayısı"
        required: false
        default: "50"

      manual_leaders:
        description: "Test liderleri (örnek: TUPRS,THYAO). Boş bırakılırsa V8 adayları kullanılır."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: bist-v10-follow-test
  cancel-in-progress: false

jobs:
  follow-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      TOKEN: ${{ secrets.TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

      V8_SYMBOL_LIMIT: ${{ github.event.inputs.symbol_limit || '50' }}
      V9_SYMBOL_LIMIT: ${{ github.event.inputs.symbol_limit || '50' }}

      V10_MANUAL_LEADERS: ${{ github.event.inputs.manual_leaders || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run V9 Leader-Lag Analysis
        run: |
          python v9_leader_lag.py

      - name: Run V8 Live Leaders
        run: |
          python v8_main.py

      - name: Run V10 Prediction Engine
        run: |
          python v10_follow_prediction.py

      - name: Send Telegram Report
        run: |
          python v10_telegram.py

      - name: Show Results
        if: always()
        run: |
          echo "========== V10 FOLLOW PREDICTIONS =========="

          if [ -f v10_follow_predictions.csv ]; then
            cat v10_follow_predictions.csv
          else
            echo "v10_follow_predictions.csv bulunamadı."
          fi

          echo ""
          echo "========== V9 RELATIONS =========="

          if [ -f v9_leader_lag_results.csv ]; then
            head -20 v9_leader_lag_results.csv
          else
            echo "v9_leader_lag_results.csv bulunamadı."
          fi

          echo ""
          echo "========== V8 LEADERS =========="

          if [ -f v8_today_candidates.csv ]; then
            cat v8_today_candidates.csv
          else
            echo "v8_today_candidates.csv bulunamadı."
          fi

      - name: Upload Prediction Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v10-follow-predictions
          path: v10_follow_predictions.csv
          if-no-files-found: warn
