name: BIST INTRADAY

on:
  schedule:
    - cron: "*/15 7-15 * * 1-5"
  workflow_dispatch:

jobs:
  intraday-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Kütüphaneler
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests ta numpy lxml html5lib beautifulsoup4

      - name: Gün içi alarm çalıştır
        run: python bot.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_MODE: intraday
